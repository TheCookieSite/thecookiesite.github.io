<!DOCTYPE html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cafe - Cookie Cafe</title>
    
    <link rel="stylesheet" href="/style.css">
    
    <style>
        body {
            background-color: #958473;
        }
        .door {
            left: 1155px;
            bottom: 210px;
        }
        .table-chair {
            left: 1110px;
            bottom: 50px;
        }
        .shelf {
            left: 485px;
            bottom: 755px;
        }
        .counter {
            left: 335px;
            bottom: 105px;
        }
        .shopkeeper {
            left: 560px;
            bottom: 180px;
        }
        .bar-seat {
            left: 220px;
            bottom: 30px;
        }
    </style>
    
    <link rel="stylesheet" href="/cursor/cursor.css">
    <script src="/cursor/cursor.js"></script>
</head>
<body>
    
    <div id="content">
        <img src="/media/cafe/bg.png" alt="A background" class="absolute bottom-locked" draggable="false">

        <a id="door"><img src="/media/cafe/door.png" alt="A door" class="absolute door" draggable="false"></a>
        <img src="/media/cafe/table_chair.png" alt="A background" class="absolute table-chair" draggable="false">
        <a id="shelf"><img src="/media/cafe/shelf.png" alt="A shelf" class="absolute shelf" draggable="false"></a>

        <a id="counter" href="counter/">
            <img src="/media/cafe/shopkeeper.png" alt="A shopkeeper" class="absolute shopkeeper" draggable="false">
            <img src="/media/cafe/counter.png" alt="A counter" class="absolute counter" draggable="false">
        </a>
        <img src="/media/cafe/bar_seat.png" alt="A bar seat" class="absolute bar-seat" draggable="false">
    </div>

    <a href=".." id="back"><img src="/media/back_button.png" alt="A back button" class="absolute back-button" draggable="false"></a>

    <div id="mobile-content" class="error">
        <h1>The website doesn't support mobile!</h1>
        <h3>Please open the site on desktop</h3>

        <img src="/media/broken_cookie.png" alt="" width="256px" draggable="false">
  </div>

</body>
</html>
