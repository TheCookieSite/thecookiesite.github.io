<!DOCTYPE html>
<head>
    <title>cafe</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins">
    
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .door {
            left: 1155px;
            bottom: 210px;
        }
        .table-chair {
            left: 1110px;
            bottom: 50px;
        }
        .shelf {
            left: 485px;
            bottom: 755px;
        }
        .counter {
            left: 335px;
            bottom: 105px;
        }
        .shopkeeper {
            left: 560px;
            bottom: 200px;
        }

<body>
    
    <div id="content">
        <img src="/media/cafe/bg.png" alt="A background" class="fixed bottom-locked">

        <a id="counter">
            <img src="/media/cafe/shopkeeper.png" alt="A shopkeeper" class="fixed shopkeeper">

    <a href=".." id="back"><img src="/media/back_button.png" alt="A back button" class="fixed back-button"></a>
