<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Counter - Cookie Cafe</title>

    <link rel="stylesheet" href="/style.css">

    <style>
        body {
            background-color: #958473;
        }
        .shopkeeper {
            left: 640px;
            bottom: -65px;
        }
        .counter {
            left: 170px;
            bottom: -30px;
        }
        .register {
            left: 1185px;
            bottom: 140px;
        }
        .jar {
            left: 400px;
            bottom: 165px;
        }
    </style>

    <link rel="stylesheet" href="/cursor/cursor.css">
    <script src="/cursor/cursor.js"></script>
</head>

<body>
    <div id="content">
    <img src="/media/cafe/counter/bg.png" alt="A background" class="absolute bottom-locked" draggable="false">

    <a id="shoopkeeper"><img src="/media/cafe/counter/shoopkeeper.png" alt="A shopkeeper" class="absolute shopkeeper" draggable="false"></a>

    <img src="/media/cafe/counter/counter-rename.png" alt="A counter" class="absolute counter" draggable="false">
    <img src="/media/cafe/counter/register.png" alt="A register" class="absolute register" draggable="false">
    <img src="/media/cafe/counter/jar.png" alt="A jar" class="absolute jar" draggable="false">
    </div>

    <a href=".." id="back"><img src="/media/back_button.png" alt="A back button" class="absolute back-button" draggable="false"></a>

    <div id="mobile-content" class="error">
        <h1>The website doesn't support mobile!</h1>
        <h3>Please open the site on desktop</h3>
        
        <img src="/media/broken_cookie.png" alt="" width="256px" draggable="false">
    </div>

</body>

</html>
